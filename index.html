<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta name="description" content="楽譜画像にマーカーを引くだけで、自動でドレミの音階を表示して譜読みをサポートするWebツール「ドレミえる」の公式トップページです。登録やインストールは一切不要。ブラウザだけですぐに使えます。">
  <title>自動譜読みツール - ドレミえる</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@700&family=M+PLUS+1p:wght@800&display=swap" rel="stylesheet">
  
  <style>
    .font-kaisei { font-family: 'Kaisei Decol', serif; }
    .font-mplus { font-family: 'M PLUS 1p', sans-serif; }
  </style>
</head>
<body class="bg-slate-900 font-sans relative min-h-screen flex flex-col overflow-x-hidden">
  
  <div class="absolute inset-0 bg-[linear-gradient(to_right,#334155_1px,transparent_1px),linear-gradient(to_bottom,#334155_1px,transparent_1px)] bg-[size:40px_40px] opacity-30 pointer-events-none"></div>
  
  <main class="flex-grow flex items-center justify-center p-6 md:p-12 relative z-10">
    <div class="max-w-[1600px] w-full grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 items-center">
      
      <div class="lg:col-span-5 space-y-11 relative left-5 md:left-14 mt-[-260px]">
        <h1 id="anim-1" class="font-kaisei text-7xl md:text-[7rem] font-black tracking-widest drop-shadow-lg flex gap-1 md:gap-2 opacity-0 translate-y-4 transition-all duration-1000 ease-out">
          <span style="color: #86cecb">ド</span>
          <span style="color: #ebd3cf">レ</span>
          <span style="color: #ffd98c">ミ</span>
          <span style="color: #ffffff">え</span>
          <span style="color: #ffffff">る</span>
        </h1>
        
        <div id="anim-2" class="space-y-6 text-slate-300 opacity-0 translate-y-4 transition-all duration-1000 ease-out delay-300">
          <p class="font-mplus text-4xl md:text-4xl font-bold tracking-wider leading-relaxed text-white">
            <span style="color: #ff4da6">『ドレミ』</span>が<span style="color: #00d8ff">『みえる』</span>
            <span class="block mt-5">自動譜読みツール</span>
          </p>
          <div class="text-xl md:text-1xl leading-relaxed text-slate-300 space-y-3 font-medium tracking-wide">
            <p><span class="text-[#86cecb] font-black mr-2">✓</span>マーカーで塗ったところの音階を自動で表示</p>
            <p><span class="text-[#86cecb] font-black mr-2">✓</span>お手持ちの楽譜画像を読み込んで表示</p>
          </div>
        </div>
        
        <div id="anim-3" class="flex flex-wrap gap-4 pt-2 opacity-0 translate-y-4 transition-all duration-1000 ease-out delay-500">
          <a href="guide.html" class="flex items-center justify-center w-48 md:w-39 py-3.5 text-base md:text-lg font-bold text-white border border-slate-400 rounded-full hover:bg-slate-800 transition-all duration-300 active:scale-95 tracking-widest">
            使い方ガイド
          </a>
          <a href="app.html" class="flex items-center justify-center w-48 md:w-39 py-3.5 text-base md:text-lg font-bold text-white bg-blue-600 rounded-full shadow-lg hover:bg-blue-700 transition-all duration-300 active:scale-95 tracking-widest">
            始める
          </a>
        </div>
      </div>

      <div id="anim-4" class="lg:col-span-7 relative hidden lg:block mt-[250px] left-[50px] opacity-0 translate-y-4 transition-all duration-1000 ease-out delay-700">
        <img src="doremieru_index.png" alt="ドレミえるの操作画面" class="w-[123%] max-w-none h-auto block rounded-3xl shadow-2xl" />
      </div>
    </div>
  </main>

  <footer class="relative z-20 w-full py-6 text-center text-slate-400 text-sm bg-slate-900/80">
    <ul class="flex justify-center gap-6 md:gap-12">
      <li><a href="index.html" class="hover:text-slate-200 transition-colors">Top</a></li>
      <li><a href="operator.html" class="hover:text-slate-200 transition-colors">運営者情報</a></li>
      <li><a href="privacy.html" class="hover:text-slate-200 transition-colors">プライバシーポリシー</a></li>
      <li><a href="terms.html" class="hover:text-slate-200 transition-colors">利用規約</a></li>
      <li><a href="contact.html" class="hover:text-slate-200 transition-colors">お問い合わせ</a></li>
      <li><a href="history.html" class="hover:text-slate-200 transition-colors">更新履歴</a></li>
    </ul>
    <p class="mt-4 text-xs text-slate-500">&copy; 2026 Triple Play. All rights reserved.</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // ページ読み込み後、50ミリ秒待ってからアニメーションを開始
      setTimeout(() => {
        const elements = ['anim-1', 'anim-2', 'anim-3', 'anim-4'];
        elements.forEach(id => {
          const el = document.getElementById(id);
          if (el) {
            // 透明・下にズレている状態のクラスを外す
            el.classList.remove('opacity-0', 'translate-y-4');
            // 不透明・元の位置の状態のクラスを付ける（これでアニメーションが動く）
            el.classList.add('opacity-100', 'translate-y-0');
          }
        });
      }, 50);
    });
  </script>
</body>
</html>
